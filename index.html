<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaha Tahi</title>
  <meta name="description" content="Kaha Tahi Ltd — a Palmerston North social enterprise. Property services, automotive, and whatever comes next.">
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --ink: #1e3a5f;
      --accent: #c8722d;
      --paper: #f4f1ea;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
      padding: 40px 24px;
    }
    img.logo { width: min(260px, 60vw); height: auto; }
    h1 { font-size: 2.4rem; letter-spacing: 0.06em; font-weight: normal; }
    p.tag { font-size: 1.05rem; color: var(--ink); opacity: 0.75; max-width: 34em; line-height: 1.6; }
    nav { display: flex; gap: 22px; margin-top: 8px; }
    nav a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border-bottom: 1px solid transparent;
    }
    nav a:hover { border-bottom-color: var(--accent); }
    footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.5; }
  </style>
</head>
<body>
  <img class="logo" src="/logo.png" alt="Kaha Tahi logo — a tree branching outward within a geometric star">
  <h1>Kaha Tahi</h1>
  <p class="tag">A Palmerston North social enterprise — strength together, branching into whatever the mahi needs.</p>
  <nav>
    <a href="https://accounts.kahatahi.co.nz">Accounts</a>
  </nav>
  <footer>© Kaha Tahi Ltd</footer>
</body>
</html>
